summary: >
  This anonymized project plan captures representative planning metadata and
  tasks for a task-parallel software effort. The content preserves the shape of
  the source planning data while replacing organization names, people, and
  project-specific narrative with generic values suitable for tests.

execution:
  overview: >
    The project provides reusable software capabilities for modern computing
    environments through application, specialization, and infrastructure work.

  sections:
    - label: Application Work
      description: >
        The application workstream provides example applications used to drive
        interface design, integration testing, and capability demonstrations.

    - label: Specialization Work
      description: >
        The specialization workstream develops application-facing interfaces and
        data structures that adapt shared infrastructure for specific workloads.

    - label: Infrastructure Work
      description: >
        The infrastructure workstream provides runtime, topology, and data
        management capabilities used across the project.

