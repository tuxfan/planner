summary: >
  This is a plan to deliver on several outstanding feature requests to be
  delivered to the Ristra project for use in the moya application. The
  deliverables and timeline are detailed below.

execution:
  - label: Checkpoint/Restart  
    description: >
      Provide a native checkpoint/restart capability in FleCSI that supports
      recovery of all topology instances and user data. Delivery of this
      capability will be split into three parts:

      1.) MPI-only support for only the required topologies for moya with a
      basic interface for writing and reading user-defined simulation data.
      Much of this work has been done in
      [MR 621](https://re-git.lanl.gov/flecsi/flecsi/-/merge_requests/621).
      Delivery: June 1st, 2026.

      2.) MPI-only with support for all topology types with an improved
      user-defined simulation data interface (requires iteration with the
      Ristra team).
      Delivery: September 30th, 2026.

      3.) Support for all backends, i.e., add support for Legion and HPX.
      Delivery: January 1st, 2027.

      This deliverable will require some interaction between the FleCSI and
      Ristra teams to assist in integration (FleCSI) and to
      communicate feedback on the user interface (Ristra).

  - label: Device Mutator Support
    description: >
      Refactor ragged data layout to add mutator support for GPU. This is a
      challenging design space with many tradeoffs. The primary challenge is in
      designing a useful interface that mimics dynamic field resizing using
      data from a fixed-size data allocation. This may require the development
      of a new kind of mutator that is taylored to the multi-material use case,
      and may be a departure from the existing vector/map practice. Significant
      discussion and iteration will be required between the FleCSI and Ristra
      teams.

      1.) Work on this deliverable will start from the existing mutator
      design in
      [MR 756](https://re-git.lanl.gov/flecsi/flecsi/-/merge_requests/756)
      and
      [MR 717](https://re-git.lanl.gov/flecsi/flecsi/-/merge_requests/717)
      Delivery: June 1st, 2026.

      2.) There will be two efforts to understand and define requirements for a
      the new mutator type: Chris Malone will continue work on an existing
      strategy in the moya application, and The HARD team will pursue a similar
      track with the 2026 Co-Design Summer School students. Preliminary
      discussions indicate very similar requirements for these efforts.
      However, requirements will need to be updated at the end of this phase to
      determine the scope and capability for the new mutator type. It will also
      be necessary to measure performance and identify strategies for
      improvement.
      Delivery: September 30th, 2026

      Additional tasks and deliverables will be added after the second phase is
      complete.

  - label: Multi-Material Data Structures
    description: >
      Due to improvements in our understanding of the requirements for
      multi-material/multi-model data representations, this deliverable is
      initially less complex than previously thought, i.e., it is likely that
      ragged and sparse data layouts (in conjuction with Singularity-EOS) will
      be sufficient for Ristra's needs. Delivery of the above mentioned Device
      Mutator Support will satisfy this deliverable. That said, we will
      continue to investigate different use cases to test this assumption. The
      primary deliverable of this task will be an updated set of requirements
      for multi-material/multi-model data structure support that covers all
      known cases.
      Delivery: September 30th, 2026.

  - label: Execution Model Enhancements
    description: >
      Changes to allow concurrent execution of CPU and GPU tasks through
      Kokkos. The components of this deliverable are exec::cpu, exec::omp, and
      exec::gpu (FleCSI 2.4.0 from June 2025), more efficient MPI tasks, and
      automatic choice of execution space (task variants). Many of the
      requirements for this deliverable are already realeased in FleCSI 2.4.0.
      Execution of this deliverable will primarily consist of assisting the
      Ristra team to integrate the new execution model.
      Delivery: Ongoing.

