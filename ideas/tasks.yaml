summary: >
  The Task-Parallel Project (TPP) is a new organization that encompasses all
  task-based CSSE activities at LANL including FleCSI, specialization design
  and development, and internal and user application development.

  The goals of this five-year plan are to: (1) Continue support for existing
  FleCSI-based applications and users; (2) Deliver exemplar FleCSI-based codes
  aimed at the Research and Development (R&D) of FleCSI capability with
  deliverables aligned to ASC system deployments; (3) Use the requirements for
  these codes to drive new CS capability development for FleCSI deliverables;
  and (4) Renew community outreach efforts for FleCSI with an increased focus
  on workshops, tutorials, presentations, and publications.

  There is a critical need for multi-physics codes that can run efficiently on
  emerging computing architectures, especially those being evaluated and/or
  chosen for existing and future Advanced Technology Systems (ATS). The
  Task-Parallel Project (TPP) is designed to meet this challenge with a
  programming model that supports seamless hierarchical parallelism for
  exploiting the features of current and future system architectures.

  This five-year plan will attempt to create two gold-standard FleCSI-based
  multi-physics exemplar applications (radio and barchetta) that target
  multi-group, flux-limited radiation-hydrodynamics with additional physics,
  e.g., reactive burn, thermonuclear burn, and neutron transport. These
  applications will be optimized to run efficiently at scale on the Mission
  system (ATS-5 with Vera Rubin node architecture). Written descriptions and
  demonstration code will be provided to the ASC Integrated Codes (IC) teams to
  facilitate knowledge transfer from CSSE to the broader program.

  To meet these goals, we have chosen high- and low-bar paths that mitigate
  risk while still delivering new and robust capability to our target users.

